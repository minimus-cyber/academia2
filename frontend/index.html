<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Academia Intermundia — Digital Academic Swarm">
  <title>Academia Intermundia</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#9B1B30">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Droid+Sans+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>window.ACADEMIA_API = "/academia/api";</script>
</head>
<body>
  <div class="hex-bg"></div>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-logo">
        <h1>Academia Intermundia</h1>
        <p>v2.0 — 35 DAOs</p>
      </div>
      <nav>
        <a href="#" data-view="dashboard" onclick="navigate('dashboard');return false;">⬡ Dashboard</a>
        <a href="#" data-view="encyclopedia" onclick="navigate('encyclopedia',{});return false;">◈ Encyclopedia</a>
        <a href="#" data-view="publications" onclick="navigate('publications',{});return false;">◉ Publications</a>
        <a href="#" data-view="labs" onclick="navigate('labs',{});return false;">⚗ Labs</a>
      </nav>
    </aside>
    <main id="main">
      <div id="topbar">
        <h2 id="topbar-title">Academia Intermundia</h2>
        <span class="status-badge" id="status-badge">v2.0</span>
      </div>
      <div id="content">
        <div class="loader"><span></span><span></span><span></span></div>
      </div>
      <div id="input-bar">
        <textarea
          id="professor-input"
          placeholder="Professor — assign a research theme... | /lab &lt;dept&gt;: &lt;html&gt; to inject a lab canvas (Enter to send)"
          rows="1"
          onkeydown="handleProfessorInput(event)"
          oninput="autoResize(this)"></textarea>
        <button class="btn" onclick="handleProfessorInput({type:'click',preventDefault:()=>{}})">→</button>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
  <script src="wiki.js"></script>
  <script src="lab.js"></script>
</body>
</html>
